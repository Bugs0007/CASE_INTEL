# Handles ONGOING code updates only -- not first-time server setup.
#
# This workflow assumes deploy/provision.sh has already been run once against
# the target EC2 instance (system packages, swap, venv, Ollama + embedding
# model, spaCy model, the gunicorn systemd unit it restarts below, the Nginx
# site, and the narrow sudoers rule that lets EC2_USERNAME run
# `sudo systemctl restart case-intel` without a password). If any of those
# are missing on a fresh box, run provision.sh first -- see PROVISIONING.md
# for the full path from a fresh AWS account to a live deploy.
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # PROJECT_DIR/VENV_DIR must match what provision.sh set up
            # (PROJECT_DIR defaults there to ~<DEPLOY_USER>/CASE_INTEL).
            PROJECT_DIR=~/CASE_INTEL
            VENV_DIR=.venv

            cd "$PROJECT_DIR"

            git fetch origin
            git reset --hard origin/main

            source "$VENV_DIR/bin/activate"
            pip install -r requirements.txt
            python -m spacy download en_core_web_sm

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart case-intel
            # The document-processing worker runs the same codebase -- it
            # must pick up new code too, or it keeps processing with the
            # old pipeline until the next reboot. provision.sh's sudoers
            # rule covers both restarts.
            sudo systemctl restart case-intel-worker
